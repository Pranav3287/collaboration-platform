spring.application.name=collaboration-platform
server.port=8080

# ========== H2 Database (commented out - using MySQL) ==========
# spring.datasource.url=jdbc:h2:file:./data/collabdb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ========== MySQL Database ==========
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# JWT secret (change in production!)
app.jwt.secret=MyCapstoneSecretKeyForJWT2024MustBeAtLeast256BitsLong!!
app.jwt.expiration-ms=86400000

# File uploads stored in this folder
app.upload.dir=uploads

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
